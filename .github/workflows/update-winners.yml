name: Update Winners

on:
  workflow_dispatch:
    inputs:
      winners:
        description: 'JSON string of winners'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN || github.token }}

      - name: Write winners.json
        run: |
          echo '${{ github.event.inputs.winners }}' > public/winners.json

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add public/winners.json
          git commit -m "Admin: Update Oscar winners" || echo "No changes to commit"
          git push origin main
